<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz Leaderboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 560px;
      margin: 40px auto;
      color: #222;
      padding: 0 16px;
    }
    h1 {
      margin-bottom: 4px;
    }
    .back-link {
      display: block;
      margin-bottom: 6px;
      color: #555;
      text-decoration: none;
      font-size: 14px;
    }
    .back-link:last-of-type {
      margin-bottom: 18px;
    }
    .back-link:hover {
      text-decoration: underline;
    }
    .leaderboard-section {
      margin-bottom: 28px;
    }
    .leaderboard-section h2 {
      font-size: 18px;
      margin-bottom: 8px;
    }
    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .leaderboard-table th, .leaderboard-table td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid #ddd;
    }
    .leaderboard-table th {
      background: #f2f2f2;
    }
    .show-plays-btn {
      padding: 4px 10px;
      font-size: 13px;
      border: 1px solid #aaa;
      border-radius: 6px;
      background: white;
      cursor: pointer;
    }
    .show-plays-btn:hover {
      border-color: #64b5f6;
    }
    .plays-row {
      display: none;
    }
    .plays-row.visible {
      display: table-row;
    }
    .plays-row td {
      background: #f9f9f9;
    }
    .plays-row ul {
      margin: 0;
      padding-left: 20px;
    }
    .plays-row li {
      margin: 4px 0;
    }
    #logged-in-as {
      font-size: 13px;
      color: #666;
      font-weight: normal;
    }
  </style>
</head>
<body>

  <div id="main-content" style="display: none;">

    <a href="index.html" class="back-link">&larr; Back to Periodic Table</a>
    <a href="quiz.html" class="back-link">&larr; Back to Quiz</a>
    <h1>Quiz Leaderboard <span id="logged-in-as"></span></h1>

    <div id="leaderboard">Loading...</div>

  </div>

  <script type="module">
    import { requireAuth } from "./auth-gate.js";
    import { db } from "./firebase-init.js";
    import {
      collection,
      getDocs,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    requireAuth(loadLeaderboard);

    async function loadLeaderboard() {
      const board = document.getElementById("leaderboard");

      const scoresQuery = query(collection(db, "quizScores"), orderBy("timestamp", "desc"));
      const snapshot = await getDocs(scoresQuery);

      // group attempts by who took the quiz, split into practice vs. daily;
      // since the query is already newest-first, each person's attempts
      // come out newest-first too. Older records have no "type" field, so
      // treat those as practice attempts.
      const practiceByUser = new Map();
      const dailyByUser = new Map();
      snapshot.forEach((doc) => {
        const attempt = doc.data();
        const byUser = attempt.type === "daily" ? dailyByUser : practiceByUser;
        if (!byUser.has(attempt.email)) byUser.set(attempt.email, []);
        byUser.get(attempt.email).push(attempt);
      });

      board.innerHTML = "";
      board.appendChild(buildSection("Practice Quiz", practiceByUser));
      board.appendChild(buildSection("Daily Quiz", dailyByUser));
    }

    function buildSection(title, byUser) {
      const section = document.createElement("div");
      section.className = "leaderboard-section";

      const heading = document.createElement("h2");
      heading.textContent = title;
      section.appendChild(heading);

      if (byUser.size === 0) {
        const empty = document.createElement("p");
        empty.textContent = "No attempts yet.";
        section.appendChild(empty);
        return section;
      }

      const table = document.createElement("table");
      table.className = "leaderboard-table";
      table.innerHTML = `
        <thead>
          <tr>
            <th>Name</th>
            <th>High score</th>
            <th>Attempts</th>
            <th></th>
          </tr>
        </thead>
      `;
      const tbody = document.createElement("tbody");

      byUser.forEach((attempts, email) => {
        const best = attempts.reduce((a, b) => (b.score > a.score ? b : a));

        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${email}</td>
          <td>${best.score} / ${best.total}</td>
          <td>${attempts.length}</td>
          <td><button type="button" class="show-plays-btn">Show recent attempts</button></td>
        `;

        const playsRow = document.createElement("tr");
        playsRow.className = "plays-row";
        const playsCell = document.createElement("td");
        playsCell.colSpan = 4;
        const list = document.createElement("ul");
        attempts.slice(0, 3).forEach((attempt) => {
          const li = document.createElement("li");
          const when = attempt.timestamp ? attempt.timestamp.toDate().toLocaleString() : "just now";
          li.textContent = `${attempt.score} / ${attempt.total} — ${when}`;
          list.appendChild(li);
        });
        playsCell.appendChild(list);
        playsRow.appendChild(playsCell);

        const showPlaysBtn = row.querySelector(".show-plays-btn");
        showPlaysBtn.addEventListener("click", () => {
          const isVisible = playsRow.classList.toggle("visible");
          showPlaysBtn.textContent = isVisible ? "Hide attempts" : "Show recent attempts";
        });

        tbody.appendChild(row);
        tbody.appendChild(playsRow);
      });

      table.appendChild(tbody);
      section.appendChild(table);
      return section;
    }
  </script>

</body>
</html>
