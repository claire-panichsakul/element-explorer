<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Element Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 560px;
      margin: 40px auto;
      color: #222;
      padding: 0 16px;
    }
    h1 {
      margin-bottom: 4px;
    }
    #back-link, #back-link-2 {
      display: inline-block;
      margin-bottom: 18px;
      color: #555;
      text-decoration: none;
      font-size: 14px;
    }
    #back-link:hover, #back-link-2:hover {
      text-decoration: underline;
    }
    #progress {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }
    #question-box {
      background: #f2f2f2;
      border-radius: 12px;
      padding: 20px 24px;
    }
    #question-text {
      font-size: 17px;
      font-weight: bold;
      margin: 0 0 14px;
    }
    .choice-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 14px;
      margin: 8px 0;
      font-size: 14px;
      font-family: Arial, sans-serif;
      border: 1px solid #aaa;
      border-radius: 8px;
      background: white;
      cursor: pointer;
    }
    .choice-btn:hover:not(:disabled) {
      border-color: #64b5f6;
    }
    .choice-btn.correct {
      background: #81c784;
      border-color: #4caf50;
      color: white;
    }
    .choice-btn.incorrect {
      background: #e57373;
      border-color: #c62828;
      color: white;
    }
    .choice-btn:disabled {
      cursor: default;
    }
    #next-btn, #start-btn, #restart-btn {
      margin-top: 16px;
      padding: 10px 18px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      border: none;
      border-radius: 8px;
      background: #64b5f6;
      color: white;
      cursor: pointer;
    }
    #next-btn:hover, #start-btn:hover, #restart-btn:hover {
      background: #4a9de8;
    }
    #score-text {
      font-size: 22px;
      font-weight: bold;
      margin: 12px 0;
    }
    #not-saved-note {
      font-size: 13px;
      color: #666;
      font-style: italic;
    }
    #logged-in-as {
      font-size: 13px;
      color: #666;
      font-weight: normal;
    }
  </style>
</head>
<body>

  <div id="main-content" style="display: none;">

  <a href="index.html" id="back-link">&larr; Back to Periodic Table</a>
  <h1 id="quiz-title">Element Quiz <span id="logged-in-as"></span></h1>

  <div id="not-found-screen" style="display: none;">
    <p>We don't have a quiz for that element yet.</p>
    <a href="index.html" id="back-link-2">&larr; Back to Periodic Table</a>
  </div>

  <div id="intro-screen" style="display: none;">
    <p id="intro-text"></p>
    <button id="start-btn" type="button">Start Quiz</button>
  </div>

  <div id="quiz-screen" style="display: none;">
    <div id="progress"></div>
    <div id="question-box">
      <p id="question-text"></p>
      <div id="choices"></div>
    </div>
    <button id="next-btn" type="button" style="display: none;">Next</button>
  </div>

  <div id="end-screen" style="display: none;">
    <p id="score-text"></p>
    <p id="not-saved-note">This is for practice so you do well on the daily quiz!</p>
    <button id="restart-btn" type="button">Try Again</button>
  </div>

    const params = new URLSearchParams(window.location.search);
    const elementNumber = parseInt(params.get("el"), 10);
    const elementQuiz = ELEMENT_QUIZZES[elementNumber];

    const quizTitle = document.getElementById("quiz-title");
    const notFoundScreen = document.getElementById("not-found-screen");
    const introScreen = document.getElementById("intro-screen");
    const introText = document.getElementById("intro-text");
    const quizScreen = document.getElementById("quiz-screen");
    const endScreen = document.getElementById("end-screen");
    const progressEl = document.getElementById("progress");
    const questionText = document.getElementById("question-text");
    const choicesBox = document.getElementById("choices");
    const nextBtn = document.getElementById("next-btn");
    const scoreText = document.getElementById("score-text");

    if (!elementQuiz) {
      notFoundScreen.style.display = "block";
    } else {
      quizTitle.childNodes[0].nodeValue = `${elementQuiz.name} Quiz `;
      introText.textContent = `Think you know ${elementQuiz.name}? Answer these 3 quick questions!`;
      introScreen.style.display = "block";
    }

    let currentIndex = 0;
    let score = 0;

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function startQuiz() {
      currentIndex = 0;
      score = 0;
      introScreen.style.display = "none";
      endScreen.style.display = "none";
      quizScreen.style.display = "block";
      showQuestion();
    }

    function showQuestion() {
      nextBtn.style.display = "none";
      const question = elementQuiz.questions[currentIndex];
      progressEl.textContent = `Question ${currentIndex + 1} of ${elementQuiz.questions.length} — Score: ${score}`;
      questionText.textContent = question.q;

      const choiceOrder = shuffle(question.choices.map((text, i) => ({
        text,
        isCorrect: i === question.correct
      })));

      choicesBox.innerHTML = "";
      choiceOrder.forEach(choice => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "choice-btn";
        btn.textContent = choice.text;
        btn.addEventListener("click", () => selectAnswer(btn, choice, choiceOrder));
        choicesBox.appendChild(btn);
      });
    }

    function selectAnswer(button, choice, choiceOrder) {
      const allButtons = choicesBox.querySelectorAll(".choice-btn");
      allButtons.forEach(btn => (btn.disabled = true));

      if (choice.isCorrect) {
        button.classList.add("correct");
        score++;
      } else {
        button.classList.add("incorrect");
        const correctBtn = [...allButtons].find((btn, i) => choiceOrder[i].isCorrect);
        if (correctBtn) correctBtn.classList.add("correct");
      }

      progressEl.textContent = `Question ${currentIndex + 1} of ${elementQuiz.questions.length} — Score: ${score}`;
      nextBtn.style.display = "inline-block";
      nextBtn.textContent = currentIndex === elementQuiz.questions.length - 1 ? "See Score" : "Next";
    }

    nextBtn.addEventListener("click", () => {
      currentIndex++;
      if (currentIndex < elementQuiz.questions.length) {
        showQuestion();
      } else {
        quizScreen.style.display = "none";
        endScreen.style.display = "block";
        scoreText.textContent = `You scored ${score} out of ${elementQuiz.questions.length}!`;
      }
    });

    if (elementQuiz) {
      document.getElementById("start-btn").addEventListener("click", startQuiz);
      document.getElementById("restart-btn").addEventListener("click", startQuiz);
    }
  </script>
