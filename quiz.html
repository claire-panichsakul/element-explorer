<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Practice Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 560px;
      margin: 40px auto;
      color: #222;
      padding: 0 16px;
    }
    h1 {
      margin-bottom: 4px;
    }
    #back-link {
      display: inline-block;
      margin-bottom: 18px;
      color: #555;
      text-decoration: none;
      font-size: 14px;
    }
    #back-link:hover {
      text-decoration: underline;
    }
    #progress {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }
    #question-box {
      background: #f2f2f2;
      border-radius: 12px;
      padding: 20px 24px;
    }
    #question-text {
      font-size: 17px;
      font-weight: bold;
      margin: 0 0 6px;
    }
    #song-tag {
      font-size: 13px;
      color: #7a5b00;
      margin: 0 0 14px;
    }
    .choice-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 14px;
      margin: 8px 0;
      font-size: 14px;
      font-family: Arial, sans-serif;
      border: 1px solid #aaa;
      border-radius: 8px;
      background: white;
      cursor: pointer;
    }
    .choice-btn:hover:not(:disabled) {
      border-color: #64b5f6;
    }
    .choice-btn.correct {
      background: #81c784;
      border-color: #4caf50;
      color: white;
    }
    .choice-btn.incorrect {
      background: #e57373;
      border-color: #c62828;
      color: white;
    }
    .choice-btn:disabled {
      cursor: default;
    }
    #next-btn, #start-btn, #restart-btn, #thai-toggle-btn {
      margin-top: 16px;
      padding: 10px 18px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      border: none;
      border-radius: 8px;
      background: #64b5f6;
      color: white;
      cursor: pointer;
    }
    #next-btn:hover, #start-btn:hover, #restart-btn:hover, #thai-toggle-btn:hover {
      background: #4a9de8;
    }
    #thai-toggle-btn {
      margin-top: 0;
      margin-bottom: 10px;
    }
    #score-text {
      font-size: 22px;
      font-weight: bold;
      margin: 12px 0;
    }
    #logged-in-as {
      font-size: 13px;
      color: #666;
      font-weight: normal;
    }
    #leaderboard-link {
      display: inline-block;
      margin-top: 10px;
      color: #64b5f6;
    }
  </style>
</head>
<body>

  <div id="main-content" style="display: none;">

  <a href="index.html" id="back-link">&larr; Back to Periodic Table</a>
  <h1>Practice Quiz <span id="logged-in-as"></span></h1>

  <div id="intro-screen">
    <p>Test what you know about the elements! Each round pulls 10 random questions from a pool of 100, so you'll get a different quiz every time.</p>
    <button id="start-btn" type="button">Start Quiz</button>
  </div>

  <div id="quiz-screen" style="display: none;">
    <button id="thai-toggle-btn" type="button">Translate to Thai</button>
    <div id="progress"></div>
    <div id="question-box">
      <p id="question-text"></p>
      <p id="song-tag" style="display: none;">🎵 Featured in a Sonic Scholar song!</p>
      <div id="choices"></div>
    </div>
    <button id="next-btn" type="button" style="display: none;">Next</button>
  </div>

  <div id="end-screen" style="display: none;">
    <p id="score-text"></p>
    <button id="restart-btn" type="button">Play Again</button>
    <br>
    <a href="leaderboard.html" id="leaderboard-link">See the leaderboard &rarr;</a>
  </div>

  </div>

  <script type="module">
    import { requireAuth } from "./auth-gate.js";
    import { db } from "./firebase-init.js";
    import {
      collection,
      addDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    let currentUser = null;
    requireAuth((user) => { currentUser = user; });

    // Pool of 100 questions. Each round picks 10 at random.
    const QUESTIONS = [
      { q: "What is the chemical symbol for gold?", qTh: "สัญลักษณ์ทางเคมีของทองคำคืออะไร", choices: ["Au", "Ag", "Gd", "Go"], choicesTh: ["Au", "Ag", "Gd", "Go"], correct: 0 },
      { q: "Which element has the atomic number 1?", qTh: "ธาตุใดมีเลขอะตอมเท่ากับ 1", choices: ["Hydrogen", "Helium", "Oxygen", "Carbon"], choicesTh: ["ไฮโดรเจน", "ฮีเลียม", "ออกซิเจน", "คาร์บอน"], correct: 0 },
      { q: "What do we call elements like helium, neon, and argon that rarely react with other elements?", qTh: "เราเรียกธาตุอย่างฮีเลียม นีออน และอาร์กอน ที่แทบไม่ทำปฏิกิริยากับธาตุอื่นว่าอะไร", choices: ["Noble gases", "Alkali metals", "Halogens", "Metalloids"], choicesTh: ["แก๊สมีตระกูล", "โลหะแอลคาไล", "ธาตุแฮโลเจน", "ธาตุกึ่งโลหะ"], correct: 0 },
      { q: "Which element makes up about 21% of Earth's atmosphere and is essential for breathing?", qTh: "ธาตุใดคิดเป็นประมาณ 21% ของบรรยากาศโลก และจำเป็นต่อการหายใจ", choices: ["Oxygen", "Nitrogen", "Carbon", "Hydrogen"], choicesTh: ["ออกซิเจน", "ไนโตรเจน", "คาร์บอน", "ไฮโดรเจน"], correct: 0 },
      { q: "What is the most abundant element in the universe?", qTh: "ธาตุใดมีมากที่สุดในเอกภพ", choices: ["Hydrogen", "Helium", "Oxygen", "Carbon"], choicesTh: ["ไฮโดรเจน", "ฮีเลียม", "ออกซิเจน", "คาร์บอน"], correct: 0 },
      { q: "Which of these elements is a liquid at room temperature?", qTh: "ธาตุใดต่อไปนี้เป็นของเหลวที่อุณหภูมิห้อง", choices: ["Mercury", "Iron", "Sodium", "Sulfur"], choicesTh: ["ปรอท", "เหล็ก", "โซเดียม", "กำมะถัน"], correct: 0 },
      { q: "What is the chemical symbol for iron?", qTh: "สัญลักษณ์ทางเคมีของเหล็กคืออะไร", choices: ["Fe", "Ir", "In", "I"], choicesTh: ["Fe", "Ir", "In", "I"], correct: 0 },
      { q: "Which group contains extremely reactive metals like sodium and potassium?", qTh: "หมู่ใดประกอบด้วยโลหะที่ว่องไวต่อปฏิกิริยาอย่างมาก เช่น โซเดียมและโพแทสเซียม", choices: ["Alkali metals", "Noble gases", "Halogens", "Transition metals"], choicesTh: ["โลหะแอลคาไล", "แก๊สมีตระกูล", "ธาตุแฮโลเจน", "โลหะทรานซิชัน"], correct: 0 },
      { q: "The number of protons in an atom's nucleus is called its...", qTh: "จำนวนโปรตอนในนิวเคลียสของอะตอมเรียกว่าอะไร", choices: ["Atomic number", "Atomic mass", "Valence number", "Isotope number"], choicesTh: ["เลขอะตอม", "มวลอะตอม", "เลขวาเลนซ์", "เลขไอโซโทป"], correct: 0 },
      { q: "Plants use this element (from carbon dioxide) to build food during photosynthesis.", qTh: "พืชใช้ธาตุนี้ (จากคาร์บอนไดออกไซด์) เพื่อสร้างอาหารในกระบวนการสังเคราะห์แสง", choices: ["Carbon", "Nitrogen", "Neon", "Sulfur"], choicesTh: ["คาร์บอน", "ไนโตรเจน", "นีออน", "กำมะถัน"], correct: 0 },
      { q: "Sonic Scholar has a song about the element used to make computer chips and found in sand. What is it?", qTh: "Sonic Scholar มีเพลงเกี่ยวกับธาตุที่ใช้ทำชิปคอมพิวเตอร์และพบในทราย ธาตุนี้คืออะไร", choices: ["Silicon", "Carbon", "Sulfur", "Silver"], choicesTh: ["ซิลิคอน", "คาร์บอน", "กำมะถัน", "เงิน"], correct: 0, song: true },
      { q: "Which of these is a halogen, a group of reactive nonmetals often used in cleaning products?", qTh: "ข้อใดต่อไปนี้เป็นธาตุแฮโลเจน ซึ่งเป็นกลุ่มอโลหะที่ว่องไวต่อปฏิกิริยาและมักใช้ในผลิตภัณฑ์ทำความสะอาด", choices: ["Chlorine", "Sodium", "Argon", "Iron"], choicesTh: ["คลอรีน", "โซเดียม", "อาร์กอน", "เหล็ก"], correct: 0 },
      { q: "What is the chemical symbol for sodium?", qTh: "สัญลักษณ์ทางเคมีของโซเดียมคืออะไร", choices: ["Na", "So", "Sd", "Sn"], choicesTh: ["Na", "So", "Sd", "Sn"], correct: 0 },
      { q: "Which element is named after the sun and was spotted in the sun's spectrum before it was found on Earth?", qTh: "ธาตุใดตั้งชื่อตามดวงอาทิตย์ และถูกพบในสเปกตรัมของดวงอาทิตย์ก่อนที่จะพบบนโลก", choices: ["Helium", "Neon", "Argon", "Solarium"], choicesTh: ["ฮีเลียม", "นีออน", "อาร์กอน", "โซลาเรียม"], correct: 0 },
      { q: "What state of matter is neon at room temperature?", qTh: "นีออนอยู่ในสถานะใดที่อุณหภูมิห้อง", choices: ["Gas", "Solid", "Liquid", "Plasma"], choicesTh: ["แก๊ส", "ของแข็ง", "ของเหลว", "พลาสมา"], correct: 0 },
      { q: "This soft metal reacts violently with water and is found in table salt.", qTh: "โลหะอ่อนชนิดนี้ทำปฏิกิริยารุนแรงกับน้ำ และพบได้ในเกลือแกง", choices: ["Sodium", "Chlorine", "Iron", "Calcium"], choicesTh: ["โซเดียม", "คลอรีน", "เหล็ก", "แคลเซียม"], correct: 0 },
      { q: "Who created the first widely-used version of the periodic table in 1869?", qTh: "ใครเป็นผู้สร้างตารางธาตุฉบับแรกที่ใช้กันแพร่หลายในปี ค.ศ. 1869", choices: ["Dmitri Mendeleev", "Marie Curie", "Albert Einstein", "Isaac Newton"], choicesTh: ["Dmitri Mendeleev", "Marie Curie", "Albert Einstein", "Isaac Newton"], correct: 0 },
      { q: "The symbol Pb comes from the Latin word \"plumbum.\" Which element is it?", qTh: "สัญลักษณ์ Pb มาจากคำในภาษาละตินว่า \"plumbum\" ธาตุนี้คือธาตุใด", choices: ["Lead", "Platinum", "Phosphorus", "Palladium"], choicesTh: ["ตะกั่ว", "แพลตทินัม", "ฟอสฟอรัส", "แพลเลเดียม"], correct: 0 },
      { q: "Sonic Scholar has a song about element #6, the basis of all known life on Earth. What is it?", qTh: "Sonic Scholar มีเพลงเกี่ยวกับธาตุลำดับที่ 6 ซึ่งเป็นพื้นฐานของสิ่งมีชีวิตทั้งหมดที่รู้จักบนโลก ธาตุนี้คืออะไร", choices: ["Carbon", "Oxygen", "Silicon", "Nitrogen"], choicesTh: ["คาร์บอน", "ออกซิเจน", "ซิลิคอน", "ไนโตรเจน"], correct: 0, song: true },
      { q: "Which family includes fluorine, chlorine, bromine, and iodine?", qTh: "ธาตุตระกูลใดที่รวมฟลูออรีน คลอรีน โบรมีน และไอโอดีนไว้ด้วยกัน", choices: ["Halogens", "Noble gases", "Alkaline earth metals", "Lanthanides"], choicesTh: ["ธาตุแฮโลเจน", "แก๊สมีตระกูล", "โลหะแอลคาไลน์เอิร์ท", "แลนทาไนด์"], correct: 0 },
      { q: "What is the chemical symbol for potassium?", qTh: "สัญลักษณ์ทางเคมีของโพแทสเซียมคืออะไร", choices: ["K", "Po", "Pt", "Ps"], choicesTh: ["K", "Po", "Pt", "Ps"], correct: 0 },
      { q: "Which glowing, radioactive element was discovered by Marie and Pierre Curie and later used in glow-in-the-dark paint?", qTh: "ธาตุกัมมันตรังสีเรืองแสงชนิดใดที่มารีและปีแยร์ กูว์รี ค้นพบ และภายหลังถูกนำไปใช้ในสีเรืองแสงในที่มืด", choices: ["Radium", "Radon", "Uranium", "Thorium"], choicesTh: ["เรเดียม", "เรดอน", "ยูเรเนียม", "ทอเรียม"], correct: 0 },
      { q: "How many valence electrons does an atom in Group 1 (like hydrogen or sodium) typically have?", qTh: "อะตอมในหมู่ที่ 1 (เช่น ไฮโดรเจนหรือโซเดียม) มักมีอิเล็กตรอนวาเลนซ์กี่ตัว", choices: ["1", "2", "7", "8"], choicesTh: ["1", "2", "7", "8"], correct: 0 },
      { q: "Which element is a metalloid, meaning it has properties of both metals and nonmetals?", qTh: "ธาตุใดเป็นธาตุกึ่งโลหะ ซึ่งหมายถึงมีสมบัติทั้งของโลหะและอโลหะ", choices: ["Silicon", "Iron", "Oxygen", "Sodium"], choicesTh: ["ซิลิคอน", "เหล็ก", "ออกซิเจน", "โซเดียม"], correct: 0 },
      { q: "Sonic Scholar has a song about the lightest metal on the periodic table, used in phone batteries. What is it?", qTh: "Sonic Scholar มีเพลงเกี่ยวกับโลหะที่เบาที่สุดในตารางธาตุ ซึ่งใช้ในแบตเตอรี่โทรศัพท์ ธาตุนี้คืออะไร", choices: ["Lithium", "Lead", "Iron", "Tin"], choicesTh: ["ลิเธียม", "ตะกั่ว", "เหล็ก", "ดีบุก"], correct: 0, song: true },
      { q: "Which element is the second-lightest element on the whole periodic table, and is used to fill balloons because it's safe and non-flammable?", qTh: "ธาตุใดเบาเป็นอันดับสองในตารางธาตุทั้งหมด และถูกใช้เติมลูกโป่งเพราะปลอดภัยและไม่ติดไฟ", choices: ["Helium", "Hydrogen", "Neon", "Argon"], choicesTh: ["ฮีเลียม", "ไฮโดรเจน", "นีออน", "อาร์กอน"], correct: 0 },
      { q: "Which two elements combine to form water (H2O)?", qTh: "ธาตุสองชนิดใดรวมกันเป็นน้ำ (H2O)", choices: ["Hydrogen and Oxygen", "Helium and Oxygen", "Hydrogen and Nitrogen", "Carbon and Oxygen"], choicesTh: ["ไฮโดรเจนและออกซิเจน", "ฮีเลียมและออกซิเจน", "ไฮโดรเจนและไนโตรเจน", "คาร์บอนและออกซิเจน"], correct: 0 },
      { q: "The two rows usually placed below the main periodic table are called...", qTh: "สองแถวที่มักวางไว้ด้านล่างของตารางธาตุหลักเรียกว่าอะไร", choices: ["Lanthanides and actinides", "Transition metals", "Noble gases", "Halogens"], choicesTh: ["แลนทาไนด์และแอกทิไนด์", "โลหะทรานซิชัน", "แก๊สมีตระกูล", "ธาตุแฮโลเจน"], correct: 0 },
      { q: "Which element is important for strong bones and teeth, and is found in milk?", qTh: "ธาตุใดสำคัญต่อความแข็งแรงของกระดูกและฟัน และพบได้ในนม", choices: ["Calcium", "Iron", "Potassium", "Sodium"], choicesTh: ["แคลเซียม", "เหล็ก", "โพแทสเซียม", "โซเดียม"], correct: 0 },
      { q: "Sonic Scholar has a song about the element that gives blood its red color and helps it carry oxygen. What is it?", qTh: "Sonic Scholar มีเพลงเกี่ยวกับธาตุที่ทำให้เลือดมีสีแดงและช่วยลำเลียงออกซิเจน ธาตุนี้คืออะไร", choices: ["Iron", "Copper", "Zinc", "Calcium"], choicesTh: ["เหล็ก", "ทองแดง", "สังกะสี", "แคลเซียม"], correct: 0, song: true },

      // More element facts
      { q: "What is the chemical symbol for tungsten, the metal with the highest melting point of any element?", qTh: "สัญลักษณ์ทางเคมีของทังสเตน ซึ่งเป็นโลหะที่มีจุดหลอมเหลวสูงที่สุดในบรรดาธาตุทั้งหมดคืออะไร", choices: ["W", "Tu", "Tn", "Wf"], choicesTh: ["W", "Tu", "Tn", "Wf"], correct: 0 },
      { q: "What is the chemical symbol for tin?", qTh: "สัญลักษณ์ทางเคมีของดีบุกคืออะไร", choices: ["Sn", "Ti", "Tn", "To"], choicesTh: ["Sn", "Ti", "Tn", "To"], correct: 0 },
      { q: "What is the chemical symbol for silver?", qTh: "สัญลักษณ์ทางเคมีของเงินคืออะไร", choices: ["Ag", "Si", "Sv", "Ar"], choicesTh: ["Ag", "Si", "Sv", "Ar"], correct: 0 },
      { q: "What is the chemical symbol for copper?", qTh: "สัญลักษณ์ทางเคมีของทองแดงคืออะไร", choices: ["Cu", "Co", "Cp", "Cr"], choicesTh: ["Cu", "Co", "Cp", "Cr"], correct: 0 },
      { q: "What is the chemical symbol for mercury, the only metal that's liquid at room temperature?", qTh: "สัญลักษณ์ทางเคมีของปรอท ซึ่งเป็นโลหะชนิดเดียวที่เป็นของเหลวที่อุณหภูมิห้องคืออะไร", choices: ["Hg", "Me", "Mc", "Hy"], choicesTh: ["Hg", "Me", "Mc", "Hy"], correct: 0 },
      { q: "Which halogen is added to drinking water and toothpaste to help prevent tooth decay?", qTh: "ธาตุแฮโลเจนชนิดใดถูกเติมลงในน้ำดื่มและยาสีฟันเพื่อช่วยป้องกันฟันผุ", choices: ["Fluorine", "Chlorine", "Iodine", "Bromine"], choicesTh: ["ฟลูออรีน", "คลอรีน", "ไอโอดีน", "โบรมีน"], correct: 0 },
      { q: "Which element is essential for the thyroid gland and is often added to table salt?", qTh: "ธาตุใดจำเป็นต่อต่อมไทรอยด์ และมักถูกเติมลงในเกลือแกง", choices: ["Iodine", "Iron", "Zinc", "Fluorine"], choicesTh: ["ไอโอดีน", "เหล็ก", "สังกะสี", "ฟลูออรีน"], correct: 0 },
      { q: "What is the chemical symbol for zinc?", qTh: "สัญลักษณ์ทางเคมีของสังกะสีคืออะไร", choices: ["Zn", "Zi", "Zc", "Zk"], choicesTh: ["Zn", "Zi", "Zc", "Zk"], correct: 0 },
      { q: "What is the chemical symbol for platinum?", qTh: "สัญลักษณ์ทางเคมีของแพลตทินัมคืออะไร", choices: ["Pt", "Pl", "Pn", "Po"], choicesTh: ["Pt", "Pl", "Pn", "Po"], correct: 0 },

      { q: "Which gas do humans breathe in and use for energy, and which plants release during photosynthesis?", qTh: "แก๊สใดที่มนุษย์หายใจเข้าและใช้เพื่อสร้างพลังงาน และพืชปล่อยออกมาในกระบวนการสังเคราะห์แสง", choices: ["Oxygen", "Carbon dioxide", "Nitrogen", "Hydrogen"], choicesTh: ["ออกซิเจน", "คาร์บอนไดออกไซด์", "ไนโตรเจน", "ไฮโดรเจน"], correct: 0 },
      { q: "Which gas do humans breathe out as a waste product, and plants take in for photosynthesis?", qTh: "แก๊สใดที่มนุษย์หายใจออกเป็นของเสีย และพืชรับเข้าไปเพื่อการสังเคราะห์แสง", choices: ["Carbon dioxide", "Oxygen", "Nitrogen", "Helium"], choicesTh: ["คาร์บอนไดออกไซด์", "ออกซิเจน", "ไนโตรเจน", "ฮีเลียม"], correct: 0 },
      { q: "Which lightweight gas is commonly used to fill party balloons and blimps because it's much lighter than air?", qTh: "แก๊สน้ำหนักเบาชนิดใดมักถูกใช้เติมลูกโป่งงานปาร์ตี้และเรือเหาะ เพราะเบากว่าอากาศมาก", choices: ["Helium", "Neon", "Hydrogen", "Argon"], choicesTh: ["ฮีเลียม", "นีออน", "ไฮโดรเจน", "อาร์กอน"], correct: 0 },
      { q: "Which gas is often used to fill glowing signs because it produces a bright reddish-orange light?", qTh: "แก๊สใดมักถูกใช้เติมป้ายไฟเรืองแสง เพราะให้แสงสีส้มแดงสว่าง", choices: ["Neon", "Helium", "Argon", "Krypton"], choicesTh: ["นีออน", "ฮีเลียม", "อาร์กอน", "คริปทอน"], correct: 0 },
      { q: "Which lightweight metal is commonly used to make soda cans and kitchen foil?", qTh: "โลหะน้ำหนักเบาชนิดใดมักถูกใช้ทำกระป๋องน้ำอัดลมและฟอยล์ในครัว", choices: ["Aluminum", "Iron", "Lead", "Tin"], choicesTh: ["อะลูมิเนียม", "เหล็ก", "ตะกั่ว", "ดีบุก"], correct: 0 },
      { q: "Which metal is a great conductor of electricity and is commonly used in electrical wiring?", qTh: "โลหะใดนำไฟฟ้าได้ดีเยี่ยม และมักถูกใช้ทำสายไฟ", choices: ["Copper", "Iron", "Lead", "Tin"], choicesTh: ["ทองแดง", "เหล็ก", "ตะกั่ว", "ดีบุก"], correct: 0 },
      { q: "Which of these best describes a metal's typical physical properties?", qTh: "ข้อใดอธิบายสมบัติทางกายภาพทั่วไปของโลหะได้ดีที่สุด", choices: ["Shiny, good conductor of heat and electricity, malleable", "Dull, brittle, poor conductor", "Colorless gas at room temperature", "Always liquid at room temperature"], choicesTh: ["เป็นเงา นำความร้อนและไฟฟ้าได้ดี ตีเป็นแผ่นได้", "หมองคล้ำ เปราะ นำไฟฟ้าได้ไม่ดี", "เป็นแก๊สไม่มีสีที่อุณหภูมิห้อง", "เป็นของเหลวเสมอที่อุณหภูมิห้อง"], correct: 0 },
      { q: "Which term describes elements that are typically dull, brittle when solid, and poor conductors of electricity?", qTh: "คำใดใช้อธิบายธาตุที่โดยทั่วไปหมองคล้ำ เปราะเมื่อเป็นของแข็ง และนำไฟฟ้าได้ไม่ดี", choices: ["Nonmetals", "Metals", "Metalloids", "Noble gases"], choicesTh: ["อโลหะ", "โลหะ", "ธาตุกึ่งโลหะ", "แก๊สมีตระกูล"], correct: 0 },
      { q: "What do we call the property of a metal that lets it be hammered or rolled into thin sheets without breaking?", qTh: "สมบัติของโลหะที่ทำให้สามารถตีหรือรีดให้เป็นแผ่นบางได้โดยไม่แตกหักเรียกว่าอะไร", choices: ["Malleability", "Density", "Conductivity", "Reactivity"], choicesTh: ["ความสามารถในการตีเป็นแผ่น", "ความหนาแน่น", "ความสามารถในการนำไฟฟ้า", "ความว่องไวต่อปฏิกิริยา"], correct: 0 },
      { q: "Which of these elements is well known for not reacting easily, which is why it's used for jewelry and doesn't tarnish?", qTh: "ธาตุใดต่อไปนี้ขึ้นชื่อเรื่องไม่ทำปฏิกิริยาง่าย จึงถูกนำไปใช้ทำเครื่องประดับและไม่หมองคล้ำ", choices: ["Gold", "Sodium", "Potassium", "Lithium"], choicesTh: ["ทองคำ", "โซเดียม", "โพแทสเซียม", "ลิเธียม"], correct: 0 },
      { q: "Rust forms when iron reacts with which gas in the air?", qTh: "สนิมเกิดขึ้นเมื่อเหล็กทำปฏิกิริยากับแก๊สใดในอากาศ", choices: ["Oxygen", "Nitrogen", "Carbon dioxide", "Helium"], choicesTh: ["ออกซิเจน", "ไนโตรเจน", "คาร์บอนไดออกไซด์", "ฮีเลียม"], correct: 0 },
      { q: "Which state of matter has both a definite shape and a definite volume?", qTh: "สถานะของสสารใดมีทั้งรูปร่างที่แน่นอนและปริมาตรที่แน่นอน", choices: ["Solid", "Liquid", "Gas", "Plasma"], choicesTh: ["ของแข็ง", "ของเหลว", "แก๊ส", "พลาสมา"], correct: 0 }
    ];

    const ROUND_SIZE = 10;

    const introScreen = document.getElementById("intro-screen");
    const quizScreen = document.getElementById("quiz-screen");
    const endScreen = document.getElementById("end-screen");
    const progressEl = document.getElementById("progress");
    const questionText = document.getElementById("question-text");
    const songTag = document.getElementById("song-tag");
    const choicesBox = document.getElementById("choices");
    const nextBtn = document.getElementById("next-btn");
    const scoreText = document.getElementById("score-text");
    const thaiToggleBtn = document.getElementById("thai-toggle-btn");

    let round = [];
    let currentIndex = 0;
    let score = 0;
    let translateToThai = false;
    let currentQuestion = null;
    let currentChoiceEls = [];

    thaiToggleBtn.addEventListener("click", () => {
      translateToThai = !translateToThai;
      thaiToggleBtn.textContent = translateToThai ? "Show in English" : "Translate to Thai";
      applyLanguage();
    });

    // re-applies the current language to whatever's on screen, without
    // resetting the shuffled choice order or which button was clicked
    function applyLanguage() {
      if (!currentQuestion) return;
      questionText.textContent = translateToThai ? currentQuestion.qTh : currentQuestion.q;
      currentChoiceEls.forEach(({ btn, entry }) => {
        btn.textContent = translateToThai ? entry.textTh : entry.text;
      });
    }

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function startRound() {
      round = shuffle(QUESTIONS).slice(0, ROUND_SIZE);
      currentIndex = 0;
      score = 0;
      introScreen.style.display = "none";
      endScreen.style.display = "none";
      quizScreen.style.display = "block";
      showQuestion();
    }

    function showQuestion() {
      nextBtn.style.display = "none";
      const question = round[currentIndex];
      currentQuestion = question;
      progressEl.textContent = `Question ${currentIndex + 1} of ${round.length} — Score: ${score}`;
      songTag.style.display = question.song ? "block" : "none";

      // shuffle the answer choices so the correct one isn't always first
      const choiceOrder = shuffle(question.choices.map((text, i) => ({
        text,
        textTh: question.choicesTh[i],
        isCorrect: i === question.correct
      })));

      choicesBox.innerHTML = "";
      currentChoiceEls = [];
      choiceOrder.forEach(choice => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "choice-btn";
        btn.addEventListener("click", () => selectAnswer(btn, choice, choiceOrder));
        choicesBox.appendChild(btn);
        currentChoiceEls.push({ btn, entry: choice });
      });

      applyLanguage();
    }

    function selectAnswer(button, choice, choiceOrder) {
      const allButtons = choicesBox.querySelectorAll(".choice-btn");
      allButtons.forEach(btn => (btn.disabled = true));

      if (choice.isCorrect) {
        button.classList.add("correct");
        score++;
      } else {
        button.classList.add("incorrect");
        const correctBtn = [...allButtons].find((btn, i) => choiceOrder[i].isCorrect);
        if (correctBtn) correctBtn.classList.add("correct");
      }

      progressEl.textContent = `Question ${currentIndex + 1} of ${round.length} — Score: ${score}`;
      nextBtn.style.display = "inline-block";
      nextBtn.textContent = currentIndex === round.length - 1 ? "See Score" : "Next";
    }

    nextBtn.addEventListener("click", () => {
      currentIndex++;
      if (currentIndex < round.length) {
        showQuestion();
      } else {
        quizScreen.style.display = "none";
        endScreen.style.display = "block";
        scoreText.textContent = `You scored ${score} out of ${round.length}!`;
        saveScore(score, round.length);
      }
    });

    // records this attempt in Firestore so the leaderboard page can show it
    function saveScore(score, total) {
      if (!currentUser) return;
      addDoc(collection(db, "quizScores"), {
        uid: currentUser.uid,
        email: currentUser.email,
        score,
        total,
        type: "practice",
        timestamp: serverTimestamp()
      });
    }

    document.getElementById("start-btn").addEventListener("click", startRound);
    document.getElementById("restart-btn").addEventListener("click", startRound);
  </script>

</body>
</html>
