<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Practice Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 560px;
      margin: 40px auto;
      color: #222;
      padding: 0 16px;
    }
    h1 {
      margin-bottom: 4px;
    }
    #back-link {
      display: inline-block;
      margin-bottom: 18px;
      color: #555;
      text-decoration: none;
      font-size: 14px;
    }
    #back-link:hover {
      text-decoration: underline;
    }
    #progress {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }
    #question-box {
      background: #f2f2f2;
      border-radius: 12px;
      padding: 20px 24px;
    }
    #question-text {
      font-size: 17px;
      font-weight: bold;
      margin: 0 0 6px;
    }
    #song-tag {
      font-size: 13px;
      color: #7a5b00;
      margin: 0 0 14px;
    }
    .choice-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 14px;
      margin: 8px 0;
      font-size: 14px;
      font-family: Arial, sans-serif;
      border: 1px solid #aaa;
      border-radius: 8px;
      background: white;
      cursor: pointer;
    }
    .choice-btn:hover:not(:disabled) {
      border-color: #64b5f6;
    }
    .choice-btn.correct {
      background: #81c784;
      border-color: #4caf50;
      color: white;
    }
    .choice-btn.incorrect {
      background: #e57373;
      border-color: #c62828;
      color: white;
    }
    .choice-btn:disabled {
      cursor: default;
    }
    #next-btn, #start-btn, #restart-btn {
      margin-top: 16px;
      padding: 10px 18px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      border: none;
      border-radius: 8px;
      background: #64b5f6;
      color: white;
      cursor: pointer;
    }
    #next-btn:hover, #start-btn:hover, #restart-btn:hover {
      background: #4a9de8;
    }
    #score-text {
      font-size: 22px;
      font-weight: bold;
      margin: 12px 0;
    }
    #login-gate {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      margin: -40px -16px;
    }
    #login-form {
      text-align: center;
      background: #f2f2f2;
      padding: 30px 40px;
      border-radius: 12px;
    }
    #login-email, #login-password {
      display: block;
      margin: 10px auto;
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid #aaa;
      border-radius: 6px;
      width: 220px;
    }
    #login-hint {
      color: #c00;
      font-size: 13px;
      min-height: 16px;
    }
    #logged-in-as {
      font-size: 13px;
      color: #666;
      font-weight: normal;
    }
    #logout-link {
      display: inline-block;
      margin-left: 12px;
      font-size: 13px;
      color: #666;
      cursor: pointer;
      text-decoration: underline;
    }
    #leaderboard-link {
      display: inline-block;
      margin-top: 10px;
      color: #64b5f6;
    }
  </style>
</head>
<body>

  <div id="login-gate" style="display: none;">
    <form id="login-form">
      <h2>Log in</h2>
      <input type="email" id="login-email" placeholder="Email" autofocus required>
      <input type="password" id="login-password" placeholder="Password" required>
      <button type="submit">Log in</button>
      <p id="login-hint"></p>
    </form>
  </div>

  <div id="main-content" style="display: none;">

  <a href="index.html" id="back-link">&larr; Back to Periodic Table</a>
  <h1>Practice Quiz <span id="logged-in-as"></span> <span id="logout-link">Log out</span></h1>

  <div id="intro-screen">
    <p>Test what you know about the elements! Each round pulls 10 random questions from a pool of 100, so you'll get a different quiz every time.</p>
    <button id="start-btn" type="button">Start Quiz</button>
  </div>

  <div id="quiz-screen" style="display: none;">
    <div id="progress"></div>
    <div id="question-box">
      <p id="question-text"></p>
      <p id="song-tag" style="display: none;">🎵 Featured in a Sonic Scholar song!</p>
      <div id="choices"></div>
    </div>
    <button id="next-btn" type="button" style="display: none;">Next</button>
  </div>

  <div id="end-screen" style="display: none;">
    <p id="score-text"></p>
    <button id="restart-btn" type="button">Play Again</button>
    <br>
    <a href="leaderboard.html" id="leaderboard-link">See the leaderboard &rarr;</a>
  </div>

  </div>

  <script type="module">
    import { requireLogin } from "./auth-gate.js";
    import { db } from "./firebase-init.js";
    import {
      collection,
      addDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    let currentUser = null;
    requireLogin((user) => { currentUser = user; });

    // Pool of 100 questions. Each round picks 10 at random.
    const QUESTIONS = [
      { q: "What is the chemical symbol for gold?", choices: ["Au", "Ag", "Gd", "Go"], correct: 0 },
      { q: "Which element has the atomic number 1?", choices: ["Hydrogen", "Helium", "Oxygen", "Carbon"], correct: 0 },
      { q: "What do we call elements like helium, neon, and argon that rarely react with other elements?", choices: ["Noble gases", "Alkali metals", "Halogens", "Metalloids"], correct: 0 },
      { q: "Which element makes up about 21% of Earth's atmosphere and is essential for breathing?", choices: ["Oxygen", "Nitrogen", "Carbon", "Hydrogen"], correct: 0 },
      { q: "What is the most abundant element in the universe?", choices: ["Hydrogen", "Helium", "Oxygen", "Carbon"], correct: 0 },
      { q: "Which of these elements is a liquid at room temperature?", choices: ["Mercury", "Iron", "Sodium", "Sulfur"], correct: 0 },
      { q: "What is the chemical symbol for iron?", choices: ["Fe", "Ir", "In", "I"], correct: 0 },
      { q: "Which group contains extremely reactive metals like sodium and potassium?", choices: ["Alkali metals", "Noble gases", "Halogens", "Transition metals"], correct: 0 },
      { q: "The number of protons in an atom's nucleus is called its...", choices: ["Atomic number", "Atomic mass", "Valence number", "Isotope number"], correct: 0 },
      { q: "Plants use this element (from carbon dioxide) to build food during photosynthesis.", choices: ["Carbon", "Nitrogen", "Neon", "Sulfur"], correct: 0 },
      { q: "Sonic Scholar has a song about the element used to make computer chips and found in sand. What is it?", choices: ["Silicon", "Carbon", "Sulfur", "Silver"], correct: 0, song: true },
      { q: "Which of these is a halogen, a group of reactive nonmetals often used in cleaning products?", choices: ["Chlorine", "Sodium", "Argon", "Iron"], correct: 0 },
      { q: "What is the chemical symbol for sodium?", choices: ["Na", "So", "Sd", "Sn"], correct: 0 },
      { q: "Which element is named after the sun and was spotted in the sun's spectrum before it was found on Earth?", choices: ["Helium", "Neon", "Argon", "Solarium"], correct: 0 },
      { q: "What state of matter is neon at room temperature?", choices: ["Gas", "Solid", "Liquid", "Plasma"], correct: 0 },
      { q: "This soft metal reacts violently with water and is found in table salt.", choices: ["Sodium", "Chlorine", "Iron", "Calcium"], correct: 0 },
      { q: "Who created the first widely-used version of the periodic table in 1869?", choices: ["Dmitri Mendeleev", "Marie Curie", "Albert Einstein", "Isaac Newton"], correct: 0 },
      { q: "The symbol Pb comes from the Latin word \"plumbum.\" Which element is it?", choices: ["Lead", "Platinum", "Phosphorus", "Palladium"], correct: 0 },
      { q: "Sonic Scholar has a song about element #6, the basis of all known life on Earth. What is it?", choices: ["Carbon", "Oxygen", "Silicon", "Nitrogen"], correct: 0, song: true },
      { q: "Which family includes fluorine, chlorine, bromine, and iodine?", choices: ["Halogens", "Noble gases", "Alkaline earth metals", "Lanthanides"], correct: 0 },
      { q: "What is the chemical symbol for potassium?", choices: ["K", "Po", "Pt", "Ps"], correct: 0 },
      { q: "Which glowing, radioactive element was discovered by Marie and Pierre Curie and later used in glow-in-the-dark paint?", choices: ["Radium", "Radon", "Uranium", "Thorium"], correct: 0 },
      { q: "How many valence electrons does an atom in Group 1 (like hydrogen or sodium) typically have?", choices: ["1", "2", "7", "8"], correct: 0 },
      { q: "Which element is a metalloid, meaning it has properties of both metals and nonmetals?", choices: ["Silicon", "Iron", "Oxygen", "Sodium"], correct: 0 },
      { q: "Sonic Scholar has a song about the lightest metal on the periodic table, used in phone batteries. What is it?", choices: ["Lithium", "Lead", "Iron", "Tin"], correct: 0, song: true },
      { q: "Which element is the second-lightest element on the whole periodic table, and is used to fill balloons because it's safe and non-flammable?", choices: ["Helium", "Hydrogen", "Neon", "Argon"], correct: 0 },
      { q: "Which two elements combine to form water (H2O)?", choices: ["Hydrogen and Oxygen", "Helium and Oxygen", "Hydrogen and Nitrogen", "Carbon and Oxygen"], correct: 0 },
      { q: "The two rows usually placed below the main periodic table are called...", choices: ["Lanthanides and actinides", "Transition metals", "Noble gases", "Halogens"], correct: 0 },
      { q: "Which element is important for strong bones and teeth, and is found in milk?", choices: ["Calcium", "Iron", "Potassium", "Sodium"], correct: 0 },
      { q: "Sonic Scholar has a song about the element that gives blood its red color and helps it carry oxygen. What is it?", choices: ["Iron", "Copper", "Zinc", "Calcium"], correct: 0, song: true },

      // More element facts
      { q: "What is the chemical symbol for tungsten, the metal with the highest melting point of any element?", choices: ["W", "Tu", "Tn", "Wf"], correct: 0 },
      { q: "What is the chemical symbol for tin?", choices: ["Sn", "Ti", "Tn", "To"], correct: 0 },
      { q: "What is the chemical symbol for silver?", choices: ["Ag", "Si", "Sv", "Ar"], correct: 0 },
      { q: "What is the chemical symbol for copper?", choices: ["Cu", "Co", "Cp", "Cr"], correct: 0 },
      { q: "What is the chemical symbol for mercury, the only metal that's liquid at room temperature?", choices: ["Hg", "Me", "Mc", "Hy"], correct: 0 },
      { q: "Which halogen is added to drinking water and toothpaste to help prevent tooth decay?", choices: ["Fluorine", "Chlorine", "Iodine", "Bromine"], correct: 0 },
      { q: "Which element is essential for the thyroid gland and is often added to table salt?", choices: ["Iodine", "Iron", "Zinc", "Fluorine"], correct: 0 },
      { q: "What is the chemical symbol for zinc?", choices: ["Zn", "Zi", "Zc", "Zk"], correct: 0 },
      { q: "What is the chemical symbol for platinum?", choices: ["Pt", "Pl", "Pn", "Po"], correct: 0 },
      { q: "Which radioactive gas is a natural byproduct of uranium decay and can build up in basements?", choices: ["Radon", "Radium", "Xenon", "Krypton"], correct: 0 },
      { q: "Which element is a key ingredient in bones and teeth, along with calcium, and is also part of DNA?", choices: ["Phosphorus", "Sulfur", "Nitrogen", "Potassium"], correct: 0 },
      { q: "Which element is famous for its rotten-egg smell in compounds like hydrogen sulfide?", choices: ["Sulfur", "Selenium", "Silicon", "Sodium"], correct: 0 },
      { q: "Which family of elements, including lanthanum and cerium, is often used in magnets, batteries, and phone screens?", choices: ["Lanthanides", "Actinides", "Halogens", "Alkali metals"], correct: 0 },
      { q: "Which family of elements includes uranium and plutonium, and is mostly radioactive?", choices: ["Actinides", "Lanthanides", "Noble gases", "Transition metals"], correct: 0 },
      { q: "Iron, copper, and gold all belong to the large middle block of the periodic table. What is this block called?", choices: ["Transition metals", "Alkali metals", "Metalloids", "Halogens"], correct: 0 },
      { q: "Which group on the periodic table is known as the alkaline earth metals?", choices: ["Group 2", "Group 1", "Group 17", "Group 18"], correct: 0 },
      { q: "What is the term for the vertical columns on the periodic table?", choices: ["Groups", "Periods", "Rows", "Series"], correct: 0 },
      { q: "What is the term for the horizontal rows on the periodic table?", choices: ["Periods", "Groups", "Columns", "Families"], correct: 0 },
      { q: "What is the chemical symbol for barium?", choices: ["Ba", "Br", "Bo", "By"], correct: 0 },
      { q: "What is the chemical symbol for titanium, a strong, lightweight metal used in jet engines and bikes?", choices: ["Ti", "Ta", "Tn", "To"], correct: 0 },
      { q: "Which noble gas, symbol Kr, is used to fill some energy-efficient light bulbs and lasers?", choices: ["Krypton", "Xenon", "Argon", "Radon"], correct: 0 },
      { q: "Which element is used in fireworks to make bright red flames?", choices: ["Strontium", "Barium", "Calcium", "Radium"], correct: 0 },
      { q: "Copper, silver, and gold all share a column on the periodic table. What is this group sometimes nicknamed?", choices: ["The coinage metals", "The noble metals", "The alkali metals", "The halogens"], correct: 0 },
      { q: "Which gas makes up about 78% of Earth's atmosphere, more than any other gas?", choices: ["Nitrogen", "Oxygen", "Argon", "Carbon dioxide"], correct: 0 },
      { q: "What is the term for a pure substance made of only one type of atom?", choices: ["An element", "A compound", "A mixture", "A molecule"], correct: 0 },
      { q: "What is the term for a pure substance made of two or more different elements chemically bonded together?", choices: ["A compound", "An element", "A mixture", "An isotope"], correct: 0 },
      { q: "Which of these is a physical change rather than a chemical change?", choices: ["Melting ice", "Rusting iron", "Burning wood", "Baking a cake"], correct: 0 },
      { q: "Which of these is a chemical change rather than a physical change?", choices: ["Rusting iron", "Melting ice", "Boiling water", "Dissolving sugar in water"], correct: 0 },

      // Harder questions for high schoolers: atomic structure, bonding, and reactions
      { q: "What do we call atoms of the same element that have different numbers of neutrons?", choices: ["Isotopes", "Ions", "Isomers", "Isobars"], correct: 0 },
      { q: "Which subatomic particle carries a negative electric charge?", choices: ["Electron", "Proton", "Neutron", "Positron"], correct: 0 },
      { q: "Which type of bond forms when electrons are transferred from one atom to another, like between sodium and chlorine?", choices: ["Ionic bond", "Covalent bond", "Metallic bond", "Hydrogen bond"], correct: 0 },
      { q: "Which type of bond forms when atoms share electrons, like in a water molecule?", choices: ["Covalent bond", "Ionic bond", "Metallic bond", "Van der Waals bond"], correct: 0 },
      { q: "On the pH scale, a solution with a pH of 3 is considered...?", choices: ["Acidic", "Basic", "Neutral", "Radioactive"], correct: 0 },
      { q: "Which particle is emitted during alpha decay?", choices: ["A helium nucleus (2 protons, 2 neutrons)", "A high-energy electron", "A gamma ray", "A neutron"], correct: 0 },
      { q: "What is the term for the amount of time it takes for half of a radioactive sample to decay?", choices: ["Half-life", "Decay rate", "Isotope period", "Atomic clock"], correct: 0 },
      { q: "A mole of any substance contains approximately how many particles? (Avogadro's number)", choices: ["6.02 x 10^23", "3.14 x 10^23", "1.0 x 10^23", "9.8 x 10^23"], correct: 0 },
      { q: "Which scientist's model of the atom pictured a small, dense, positively charged nucleus surrounded by mostly empty space?", choices: ["Ernest Rutherford", "J.J. Thomson", "Niels Bohr", "John Dalton"], correct: 0 },
      { q: "In a redox reaction, what does the term 'oxidation' mean?", choices: ["Losing electrons", "Gaining electrons", "Gaining protons", "Losing neutrons"], correct: 0 },

      // 8th grade level questions: atomic structure, properties, and everyday elements
      { q: "Which subatomic particle has a positive electric charge?", choices: ["Proton", "Electron", "Neutron", "Ion"], correct: 0 },
      { q: "Which subatomic particle has no electric charge?", choices: ["Neutron", "Proton", "Electron", "Ion"], correct: 0 },
      { q: "Where in an atom would you find its protons and neutrons?", choices: ["In the nucleus", "In the electron cloud", "Outside the atom", "In the valence shell"], correct: 0 },
      { q: "Where in an atom would you find its electrons?", choices: ["Moving around the nucleus in an electron cloud", "Packed tightly in the nucleus", "Outside the atom entirely", "In the atomic number"], correct: 0 },
      { q: "What is the term for how much mass is packed into a given volume of a substance?", choices: ["Density", "Weight", "Buoyancy", "Viscosity"], correct: 0 },
      { q: "Which is denser: a bar of gold or a same-sized bar of aluminum?", choices: ["Gold", "Aluminum", "They're the same", "Neither has density"], correct: 0 },
      { q: "What is the temperature at which a solid turns into a liquid called?", choices: ["Melting point", "Boiling point", "Freezing point", "Condensation point"], correct: 0 },
      { q: "What is the temperature at which a liquid turns into a gas called?", choices: ["Boiling point", "Melting point", "Freezing point", "Sublimation point"], correct: 0 },
      { q: "What do we call a combination of two or more substances that are physically mixed but not chemically bonded?", choices: ["A mixture", "A compound", "An element", "An isotope"], correct: 0 },
      { q: "Salt dissolved evenly in water is an example of what kind of mixture?", choices: ["A solution", "A suspension", "A compound", "An isotope"], correct: 0 },
      { q: "What is the chemical symbol for nitrogen?", choices: ["N", "Ni", "No", "Na"], correct: 0 },
      { q: "What is the chemical symbol for oxygen?", choices: ["O", "Ox", "Og", "Om"], correct: 0 },
      { q: "What is the chemical symbol for carbon?", choices: ["C", "Ca", "Co", "Cr"], correct: 0 },
      { q: "What is the chemical symbol for helium?", choices: ["He", "H", "Hl", "Hu"], correct: 0 },
      { q: "What is the chemical symbol for neon?", choices: ["Ne", "No", "N", "Nn"], correct: 0 },
      { q: "What is the chemical symbol for chlorine?", choices: ["Cl", "Ch", "Co", "Cr"], correct: 0 },
      { q: "What is the chemical symbol for calcium?", choices: ["Ca", "Cl", "Co", "Cm"], correct: 0 },
      { q: "What is the chemical symbol for magnesium?", choices: ["Mg", "Ma", "Mn", "Mo"], correct: 0 },
      { q: "What is the chemical symbol for aluminum?", choices: ["Al", "Am", "An", "Au"], correct: 0 },
      { q: "What is the chemical symbol for lithium?", choices: ["Li", "Lt", "Ln", "Lu"], correct: 0 },
      { q: "Which gas do humans breathe in and use for energy, and which plants release during photosynthesis?", choices: ["Oxygen", "Carbon dioxide", "Nitrogen", "Hydrogen"], correct: 0 },
      { q: "Which gas do humans breathe out as a waste product, and plants take in for photosynthesis?", choices: ["Carbon dioxide", "Oxygen", "Nitrogen", "Helium"], correct: 0 },
      { q: "Which lightweight gas is commonly used to fill party balloons and blimps because it's much lighter than air?", choices: ["Helium", "Neon", "Hydrogen", "Argon"], correct: 0 },
      { q: "Which gas is often used to fill glowing signs because it produces a bright reddish-orange light?", choices: ["Neon", "Helium", "Argon", "Krypton"], correct: 0 },
      { q: "Which lightweight metal is commonly used to make soda cans and kitchen foil?", choices: ["Aluminum", "Iron", "Lead", "Tin"], correct: 0 },
      { q: "Which metal is a great conductor of electricity and is commonly used in electrical wiring?", choices: ["Copper", "Iron", "Lead", "Tin"], correct: 0 },
      { q: "Which of these best describes a metal's typical physical properties?", choices: ["Shiny, good conductor of heat and electricity, malleable", "Dull, brittle, poor conductor", "Colorless gas at room temperature", "Always liquid at room temperature"], correct: 0 },
      { q: "Which term describes elements that are typically dull, brittle when solid, and poor conductors of electricity?", choices: ["Nonmetals", "Metals", "Metalloids", "Noble gases"], correct: 0 },
      { q: "What do we call the property of a metal that lets it be hammered or rolled into thin sheets without breaking?", choices: ["Malleability", "Density", "Conductivity", "Reactivity"], correct: 0 },
      { q: "Which of these elements is well known for not reacting easily, which is why it's used for jewelry and doesn't tarnish?", choices: ["Gold", "Sodium", "Potassium", "Lithium"], correct: 0 },
      { q: "Rust forms when iron reacts with which gas in the air?", choices: ["Oxygen", "Nitrogen", "Carbon dioxide", "Helium"], correct: 0 },
      { q: "Which state of matter has both a definite shape and a definite volume?", choices: ["Solid", "Liquid", "Gas", "Plasma"], correct: 0 }
    ];

    const ROUND_SIZE = 10;

    const introScreen = document.getElementById("intro-screen");
    const quizScreen = document.getElementById("quiz-screen");
    const endScreen = document.getElementById("end-screen");
    const progressEl = document.getElementById("progress");
    const questionText = document.getElementById("question-text");
    const songTag = document.getElementById("song-tag");
    const choicesBox = document.getElementById("choices");
    const nextBtn = document.getElementById("next-btn");
    const scoreText = document.getElementById("score-text");

    let round = [];
    let currentIndex = 0;
    let score = 0;

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function startRound() {
      round = shuffle(QUESTIONS).slice(0, ROUND_SIZE);
      currentIndex = 0;
      score = 0;
      introScreen.style.display = "none";
      endScreen.style.display = "none";
      quizScreen.style.display = "block";
      showQuestion();
    }

    function showQuestion() {
      nextBtn.style.display = "none";
      const question = round[currentIndex];
      progressEl.textContent = `Question ${currentIndex + 1} of ${round.length} — Score: ${score}`;
      questionText.textContent = question.q;
      songTag.style.display = question.song ? "block" : "none";

      // shuffle the answer choices so the correct one isn't always first
      const choiceOrder = shuffle(question.choices.map((text, i) => ({ text, isCorrect: i === question.correct })));

      choicesBox.innerHTML = "";
      choiceOrder.forEach(choice => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "choice-btn";
        btn.textContent = choice.text;
        btn.addEventListener("click", () => selectAnswer(btn, choice, choiceOrder));
        choicesBox.appendChild(btn);
      });
    }

    function selectAnswer(button, choice, choiceOrder) {
      const allButtons = choicesBox.querySelectorAll(".choice-btn");
      allButtons.forEach(btn => (btn.disabled = true));

      if (choice.isCorrect) {
        button.classList.add("correct");
        score++;
      } else {
        button.classList.add("incorrect");
        const correctBtn = [...allButtons].find((btn, i) => choiceOrder[i].isCorrect);
        if (correctBtn) correctBtn.classList.add("correct");
      }

      progressEl.textContent = `Question ${currentIndex + 1} of ${round.length} — Score: ${score}`;
      nextBtn.style.display = "inline-block";
      nextBtn.textContent = currentIndex === round.length - 1 ? "See Score" : "Next";
    }

    nextBtn.addEventListener("click", () => {
      currentIndex++;
      if (currentIndex < round.length) {
        showQuestion();
      } else {
        quizScreen.style.display = "none";
        endScreen.style.display = "block";
        scoreText.textContent = `You scored ${score} out of ${round.length}!`;
        saveScore(score, round.length);
      }
    });

    // records this attempt in Firestore so the leaderboard page can show it
    function saveScore(score, total) {
      if (!currentUser) return;
      addDoc(collection(db, "quizScores"), {
        uid: currentUser.uid,
        email: currentUser.email,
        score,
        total,
        timestamp: serverTimestamp()
      });
    }

    document.getElementById("start-btn").addEventListener("click", startRound);
    document.getElementById("restart-btn").addEventListener("click", startRound);
  </script>

</body>
</html>
