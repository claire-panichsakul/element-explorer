<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 560px;
      margin: 40px auto;
      color: #222;
      padding: 0 16px;
    }
    h1 {
      margin-bottom: 4px;
    }
    .back-link {
      display: block;
      margin-bottom: 6px;
      color: #555;
      text-decoration: none;
      font-size: 14px;
    }
    .back-link:last-of-type {
      margin-bottom: 18px;
    }
    .back-link:hover {
      text-decoration: underline;
    }
    #daily-date-text {
      color: #666;
      font-size: 14px;
    }
    #progress {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }
    #question-box {
      background: #f2f2f2;
      border-radius: 12px;
      padding: 20px 24px;
    }
    #question-text {
      font-size: 17px;
      font-weight: bold;
      margin: 0 0 6px;
    }
    .choice-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 14px;
      margin: 8px 0;
      font-size: 14px;
      font-family: Arial, sans-serif;
      border: 1px solid #aaa;
      border-radius: 8px;
      background: white;
      cursor: pointer;
    }
    .choice-btn:hover:not(:disabled) {
      border-color: #64b5f6;
    }
    .choice-btn.correct {
      background: #81c784;
      border-color: #4caf50;
      color: white;
    }
    .choice-btn.incorrect {
      background: #e57373;
      border-color: #c62828;
      color: white;
    }
    .choice-btn:disabled {
      cursor: default;
    }
    #next-btn, #start-btn, #thai-toggle-btn {
      margin-top: 16px;
      padding: 10px 18px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      border: none;
      border-radius: 8px;
      background: #64b5f6;
      color: white;
      cursor: pointer;
    }
    #next-btn:hover, #start-btn:hover, #thai-toggle-btn:hover {
      background: #4a9de8;
    }
    #thai-toggle-btn {
      margin-top: 0;
      margin-bottom: 10px;
    }
    #score-text {
      font-size: 22px;
      font-weight: bold;
      margin: 12px 0;
    }
    #logged-in-as {
      font-size: 13px;
      color: #666;
      font-weight: normal;
    }
    #leaderboard-link {
      display: inline-block;
      margin-top: 10px;
      color: #64b5f6;
    }
  </style>
</head>
<body>

  <div id="main-content" style="display: none;">

  <a href="index.html" class="back-link">&larr; Back to Periodic Table</a>
  <a href="quiz.html" class="back-link">&larr; Practice Quiz</a>
  <h1>Daily Quiz <span id="logged-in-as"></span></h1>

  <div id="intro-screen" style="display: none;">
    <p id="daily-date-text"></p>
    <p>10 new questions, refreshed every day at 7am Mountain Time. Everyone gets the same 10 questions on the same day!</p>
    <button id="start-btn" type="button">Start Daily Quiz</button>
  </div>

  <div id="already-played-screen" style="display: none;">
    <p id="already-played-text"></p>
    <a href="leaderboard.html" id="leaderboard-link">See the leaderboard &rarr;</a>
  </div>

  <div id="quiz-screen" style="display: none;">
    <button id="thai-toggle-btn" type="button">Translate to Thai</button>
    <div id="progress"></div>
    <div id="question-box">
      <p id="question-text"></p>
      <div id="choices"></div>
    </div>
    <button id="next-btn" type="button" style="display: none;">Next</button>
  </div>

  <div id="end-screen" style="display: none;">
    <p id="score-text"></p>
    <p>Come back tomorrow after 7am Mountain Time for a new daily quiz!</p>
    <a href="leaderboard.html" id="leaderboard-link">See the leaderboard &rarr;</a>
  </div>

  </div>

  <script type="module">
    import { requireAuth } from "./auth-gate.js";
    import { db } from "./firebase-init.js";
    import {
      collection,
      addDoc,
      getDocs,
      query,
      where,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
    import { PRACTICE_QUESTIONS, ELEMENT_QUIZZES } from "./quiz-data.js";

    // The daily quiz blends questions from both the practice quiz pool and
    // the per-element quizzes. Element quizzes are grouped by element, so
    // flatten them into one list of plain questions to pick from.
    const ELEMENT_QUESTIONS = Object.values(ELEMENT_QUIZZES).flatMap(el => el.questions);

    const PRACTICE_COUNT = 5;
    const ELEMENT_COUNT = 5;
    const ROUND_SIZE = PRACTICE_COUNT + ELEMENT_COUNT;

    // Figures out "today's" quiz day, where a new day starts at 7am
    // Mountain Time (America/Denver handles the DST switch automatically).
    function getQuizDay() {
      const now = new Date();
      const parts = new Intl.DateTimeFormat("en-US", {
        timeZone: "America/Denver",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        hourCycle: "h23"
      }).formatToParts(now);
      const map = {};
      parts.forEach(p => { map[p.type] = p.value; });

      const quizDate = new Date(Date.UTC(Number(map.year), Number(map.month) - 1, Number(map.day)));
      if (Number(map.hour) < 7) {
        quizDate.setUTCDate(quizDate.getUTCDate() - 1);
      }
      return quizDate;
    }

    function quizDayId(quizDate) {
      return quizDate.toISOString().slice(0, 10);
    }

    function hashStringToInt(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = (hash * 31 + str.charCodeAt(i)) >>> 0;
      }
      return hash;
    }

    // seeded random number generator so the same seed always shuffles
    // the same way, letting everyone get the same 10 questions on a given day
    function mulberry32(seed) {
      return function () {
        seed |= 0;
        seed = (seed + 0x6D2B79F5) | 0;
        let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function seededShuffle(array, seed) {
      const rng = mulberry32(seed);
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    const quizDate = getQuizDay();
    const dayId = quizDayId(quizDate);

    // always 5 practice-quiz questions and 5 element-quiz questions, then
    // shuffled together so everyone sees the same blended order that day
    const practicePart = seededShuffle(PRACTICE_QUESTIONS, hashStringToInt(dayId + ":practice")).slice(0, PRACTICE_COUNT);
    const elementPart = seededShuffle(ELEMENT_QUESTIONS, hashStringToInt(dayId + ":element")).slice(0, ELEMENT_COUNT);
    const round = seededShuffle([...practicePart, ...elementPart], hashStringToInt(dayId + ":order"));

    document.getElementById("daily-date-text").textContent =
      "Today's quiz: " + quizDate.toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric", timeZone: "UTC" });

    const introScreen = document.getElementById("intro-screen");
    const alreadyPlayedScreen = document.getElementById("already-played-screen");
    const alreadyPlayedText = document.getElementById("already-played-text");
    const quizScreen = document.getElementById("quiz-screen");
    const endScreen = document.getElementById("end-screen");
    const progressEl = document.getElementById("progress");
    const questionText = document.getElementById("question-text");
    const choicesBox = document.getElementById("choices");
    const nextBtn = document.getElementById("next-btn");
    const scoreText = document.getElementById("score-text");
    const thaiToggleBtn = document.getElementById("thai-toggle-btn");

    let translateToThai = false;
    let currentQuestion = null;
    let currentChoiceEls = [];

    thaiToggleBtn.addEventListener("click", () => {
      translateToThai = !translateToThai;
      thaiToggleBtn.textContent = translateToThai ? "Show in English" : "Translate to Thai";
      applyLanguage();
    });

    // re-applies the current language to whatever's on screen, without
    // resetting the shuffled choice order or which button was clicked
    function applyLanguage() {
      if (!currentQuestion) return;
      questionText.textContent = translateToThai ? currentQuestion.qTh : currentQuestion.q;
      currentChoiceEls.forEach(({ btn, entry }) => {
        btn.textContent = translateToThai ? entry.textTh : entry.text;
      });
    }

    let currentUser = null;
    requireAuth(async (user) => {
      currentUser = user;
      const existing = await getTodaysAttempt();
      if (existing) {
        alreadyPlayedText.textContent = `You already did today's quiz — you scored ${existing.score} / ${existing.total}.`;
        alreadyPlayedScreen.style.display = "block";
      } else {
        introScreen.style.display = "block";
      }
    });

    // checks whether this user already has a saved attempt for today's quizDay
    async function getTodaysAttempt() {
      const attemptsQuery = query(
        collection(db, "quizScores"),
        where("uid", "==", currentUser.uid),
        where("type", "==", "daily"),
        where("quizDay", "==", dayId)
      );
      const snapshot = await getDocs(attemptsQuery);
      return snapshot.empty ? null : snapshot.docs[0].data();
    }

    let currentIndex = 0;
    let score = 0;

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function startRound() {
      currentIndex = 0;
      score = 0;
      introScreen.style.display = "none";
      endScreen.style.display = "none";
      quizScreen.style.display = "block";
      showQuestion();
    }

    function showQuestion() {
      nextBtn.style.display = "none";
      const question = round[currentIndex];
      currentQuestion = question;
      progressEl.textContent = `Question ${currentIndex + 1} of ${round.length} — Score: ${score}`;

      // shuffle the answer choices so the correct one isn't always first
      const choiceOrder = shuffle(question.choices.map((text, i) => ({
        text,
        textTh: question.choicesTh[i],
        isCorrect: i === question.correct
      })));

      choicesBox.innerHTML = "";
      currentChoiceEls = [];
      choiceOrder.forEach(choice => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "choice-btn";
        btn.addEventListener("click", () => selectAnswer(btn, choice, choiceOrder));
        choicesBox.appendChild(btn);
        currentChoiceEls.push({ btn, entry: choice });
      });

      applyLanguage();
    }

    function selectAnswer(button, choice, choiceOrder) {
      const allButtons = choicesBox.querySelectorAll(".choice-btn");
      allButtons.forEach(btn => (btn.disabled = true));

      if (choice.isCorrect) {
        button.classList.add("correct");
        score++;
      } else {
        button.classList.add("incorrect");
        const correctBtn = [...allButtons].find((btn, i) => choiceOrder[i].isCorrect);
        if (correctBtn) correctBtn.classList.add("correct");
      }

      progressEl.textContent = `Question ${currentIndex + 1} of ${round.length} — Score: ${score}`;
      nextBtn.style.display = "inline-block";
      nextBtn.textContent = currentIndex === round.length - 1 ? "See Score" : "Next";
    }

    nextBtn.addEventListener("click", () => {
      currentIndex++;
      if (currentIndex < round.length) {
        showQuestion();
      } else {
        quizScreen.style.display = "none";
        endScreen.style.display = "block";
        scoreText.textContent = `You scored ${score} out of ${round.length}!`;
        saveScore(score, round.length);
      }
    });

    // records this attempt in Firestore so the leaderboard page can show it
    function saveScore(score, total) {
      if (!currentUser) return;
      addDoc(collection(db, "quizScores"), {
        uid: currentUser.uid,
        email: currentUser.email,
        score,
        total,
        type: "daily",
        quizDay: dayId,
        timestamp: serverTimestamp()
      });
    }

    document.getElementById("start-btn").addEventListener("click", startRound);
  </script>

</body>
</html>
