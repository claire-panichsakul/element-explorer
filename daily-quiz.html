    // Figures out "today's" quiz day, where a new day starts at 7am
    // Mountain Time (America/Denver handles the DST switch automatically).
    function getQuizDay() {
      const now = new Date();
      const parts = new Intl.DateTimeFormat("en-US", {
        timeZone: "America/Denver",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        hourCycle: "h23"
      }).formatToParts(now);
      const map = {};
      parts.forEach(p => { map[p.type] = p.value; });

      const quizDate = new Date(Date.UTC(Number(map.year), Number(map.month) - 1, Number(map.day)));
      if (Number(map.hour) < 7) {
        quizDate.setUTCDate(quizDate.getUTCDate() - 1);
      }
      return quizDate;
    }

    function quizDayId(quizDate) {
      return quizDate.toISOString().slice(0, 10);
    }

    function hashStringToInt(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = (hash * 31 + str.charCodeAt(i)) >>> 0;
      }
      return hash;
    }

    // seeded random number generator so the same seed always shuffles
    // the same way, letting everyone get the same 10 questions on a given day
    function mulberry32(seed) {
      return function () {
        seed |= 0;
        seed = (seed + 0x6D2B79F5) | 0;
        let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function seededShuffle(array, seed) {
      const rng = mulberry32(seed);
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    const quizDate = getQuizDay();
    const dayId = quizDayId(quizDate);
    const round = seededShuffle(DAILY_QUESTIONS, hashStringToInt(dayId)).slice(0, ROUND_SIZE);

    document.getElementById("daily-date-text").textContent =
      "Today's quiz: " + quizDate.toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric", timeZone: "UTC" });

    const introScreen = document.getElementById("intro-screen");
    const alreadyPlayedScreen = document.getElementById("already-played-screen");
    const alreadyPlayedText = document.getElementById("already-played-text");
    const quizScreen = document.getElementById("quiz-screen");
    const endScreen = document.getElementById("end-screen");
    const progressEl = document.getElementById("progress");
    const questionText = document.getElementById("question-text");
    const choicesBox = document.getElementById("choices");
    const nextBtn = document.getElementById("next-btn");
    const scoreText = document.getElementById("score-text");
    const thaiToggleBtn = document.getElementById("thai-toggle-btn");

    let translateToThai = false;
    let currentQuestion = null;
    let currentChoiceEls = [];

    thaiToggleBtn.addEventListener("click", () => {
      translateToThai = !translateToThai;
      thaiToggleBtn.textContent = translateToThai ? "Show in English" : "Translate to Thai";
      applyLanguage();
    });

    // re-applies the current language to whatever's on screen, without
    // resetting the shuffled choice order or which button was clicked
    function applyLanguage() {
      if (!currentQuestion) return;
      questionText.textContent = translateToThai ? currentQuestion.qTh : currentQuestion.q;
      currentChoiceEls.forEach(({ btn, entry }) => {
        btn.textContent = translateToThai ? entry.textTh : entry.text;
      });
    }

    let currentUser = null;
    requireAuth(async (user) => {
      currentUser = user;
      const existing = await getTodaysAttempt();
      if (existing) {
        alreadyPlayedText.textContent = `You already did today's quiz — you scored ${existing.score} / ${existing.total}.`;
        alreadyPlayedScreen.style.display = "block";
      } else {
        introScreen.style.display = "block";
      }
    });

    // checks whether this user already has a saved attempt for today's quizDay
    async function getTodaysAttempt() {
      const attemptsQuery = query(
        collection(db, "quizScores"),
        where("uid", "==", currentUser.uid),
        where("type", "==", "daily"),
        where("quizDay", "==", dayId)
      );
      const snapshot = await getDocs(attemptsQuery);
      return snapshot.empty ? null : snapshot.docs[0].data();
    }

    let currentIndex = 0;
    let score = 0;

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function startRound() {
      currentIndex = 0;
      score = 0;
      introScreen.style.display = "none";
      endScreen.style.display = "none";
      quizScreen.style.display = "block";
      showQuestion();
    }

    function showQuestion() {
      nextBtn.style.display = "none";
      const question = round[currentIndex];
      currentQuestion = question;
      progressEl.textContent = `Question ${currentIndex + 1} of ${round.length} — Score: ${score}`;

      // shuffle the answer choices so the correct one isn't always first
      const choiceOrder = shuffle(question.choices.map((text, i) => ({
        text,
        textTh: question.choicesTh[i],
        isCorrect: i === question.correct
      })));

      choicesBox.innerHTML = "";
      currentChoiceEls = [];
      choiceOrder.forEach(choice => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "choice-btn";
        btn.addEventListener("click", () => selectAnswer(btn, choice, choiceOrder));
        choicesBox.appendChild(btn);
        currentChoiceEls.push({ btn, entry: choice });
      });

      applyLanguage();
    }

    function selectAnswer(button, choice, choiceOrder) {
      const allButtons = choicesBox.querySelectorAll(".choice-btn");
      allButtons.forEach(btn => (btn.disabled = true));

      if (choice.isCorrect) {
        button.classList.add("correct");
        score++;
      } else {
        button.classList.add("incorrect");
        const correctBtn = [...allButtons].find((btn, i) => choiceOrder[i].isCorrect);
        if (correctBtn) correctBtn.classList.add("correct");
      }

      progressEl.textContent = `Question ${currentIndex + 1} of ${round.length} — Score: ${score}`;
      nextBtn.style.display = "inline-block";
      nextBtn.textContent = currentIndex === round.length - 1 ? "See Score" : "Next";
    }

    nextBtn.addEventListener("click", () => {
      currentIndex++;
      if (currentIndex < round.length) {
        showQuestion();
      } else {
        quizScreen.style.display = "none";
        endScreen.style.display = "block";
        scoreText.textContent = `You scored ${score} out of ${round.length}!`;
        saveScore(score, round.length);
      }
    });

    // records this attempt in Firestore so the leaderboard page can show it
    function saveScore(score, total) {
      if (!currentUser) return;
      addDoc(collection(db, "quizScores"), {
        uid: currentUser.uid,
        email: currentUser.email,
        score,
        total,
        type: "daily",
        quizDay: dayId,
        timestamp: serverTimestamp()
      });
    }

    document.getElementById("start-btn").addEventListener("click", startRound);
  </script>

</body>
</html>
